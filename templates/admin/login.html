<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Ragalia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      padding: 2rem;
    }
    .login-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--sh);
      animation: fadeUp .5s ease both;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: .55rem;
      margin-bottom: 1.8rem;
    }
    .login-logo-mark {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--cream);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
    }
    .login-logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      letter-spacing: .1em;
    }
    .login-title {
      font-size: 1.6rem;
      font-weight: 300;
      margin-bottom: .3rem;
    }
    .login-sub {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }
    .field-label {
      display: block;
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: .4rem;
    }
    .field-input {
      width: 100%;
      padding: .6rem .85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .85rem;
      color: var(--ink);
      background: var(--cream);
      transition: border-color .2s;
      margin-bottom: 1.2rem;
    }
    .field-input:focus { border-color: var(--gold); outline: none; }
    .login-btn {
      width: 100%;
      background: var(--ink);
      color: var(--cream);
      padding: .7rem;
      border-radius: var(--radius);
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .04em;
      transition: background .2s;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .login-btn:hover { background: #2d2d2a; }
    .login-error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #991B1B;
      border-radius: var(--radius);
      padding: .6rem .85rem;
      font-size: .8rem;
      margin-bottom: 1.1rem;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.2rem;
      font-size: .78rem;
      color: var(--muted);
      transition: color .2s;
    }
    .back-link:hover { color: var(--ink); }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">R</div>
      <span class="login-logo-text">Ragalia</span>
    </div>
    <h1 class="login-title">Admin Access</h1>
    <p class="login-sub">Enter your password to manage the store.</p>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label class="field-label" for="password">Password</label>
      <input class="field-input" type="password" id="password" name="password"
             placeholder="Enter admin password" autofocus required/>
      <button type="submit" class="login-btn">Sign In →</button>
    </form>

    <a href="/" class="back-link">← Back to store</a>
  </div>
</div>
</body>
</html>
