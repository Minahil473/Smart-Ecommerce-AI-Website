{% extends "base.html" %}
{% block title %}Page Not Found — Maison{% endblock %}

{% block content %}
<div class="page" style="display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 60px);">
  <div style="text-align:center; padding:2rem; animation: fadeUp .6s ease both;">
    <p style="font-size:.72rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gold); font-weight:500; margin-bottom:.75rem;">404</p>
    <h1 style="font-family:'Cormorant Garamond',serif; font-size:3.5rem; font-weight:300; margin-bottom:1rem; color:var(--ink);">Page Not Found</h1>
    <p style="color:var(--muted); font-size:.9rem; line-height:1.7; margin-bottom:2rem;">
      The page you're looking for doesn't exist.<br>
      Try browsing our collection instead.
    </p>
    <a href="/" style="display:inline-flex; align-items:center; gap:.5rem; background:var(--ink); color:var(--cream); padding:.7rem 1.6rem; border-radius:6px; font-size:.82rem; font-weight:500; letter-spacing:.04em; transition:background .2s;">
      ← Back to Shop
    </a>
  </div>
</div>
{% endblock %}
